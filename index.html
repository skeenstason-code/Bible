<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The One Story That Leads to Jesus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1>The One Story That Leads to Jesus</h1>
      <p class="subtitle">A daily Bible reading plan you can begin at any time.</p>

      <form id="jump-form" class="jump" autocomplete="off">
        <label class="sr-only" for="day-search">Jump to day</label>
        <input type="number" id="day-search" inputmode="numeric" placeholder="Jump to Day" min="1" />
        <button type="submit" id="jump-btn">Go</button>
      </form>

      <p id="jump-help" class="help"></p>
      <p id="status" class="help"></p>
    </div>
  </header>

  <main class="main">
    <section class="day-card" aria-live="polite">
      <div class="day-head">
        <h2 id="day-title">Day</h2>
        <div class="pill" id="day-count"></div>
      </div>

      <div class="block">
        <h3>Scripture</h3>
        <p id="scripture"></p>
      </div>

      <div class="block">
        <h3>Psalm</h3>
        <p id="psalm"></p>
      </div>

      <div class="block">
        <h3>Resources</h3>
        <ul id="resources"></ul>
        <p id="no-resources" class="muted" hidden>No extra resources for today.</p>
      </div>
    </section>

    <nav class="nav">
      <button id="prev" type="button">← Previous</button>
      <button id="next" type="button">Next →</button>
    </nav>
  </main>

  <footer class="footer">
    <p>
      Resources provided by
      <a href="https://bibleproject.com" target="_blank" rel="noopener noreferrer">BibleProject</a>
      • Readings open on
      <a href="https://www.biblegateway.com" target="_blank" rel="noopener noreferrer">BibleGateway (CEB)</a>
    </p>
  </footer>

  <!-- IMPORTANT: plan.js MUST load before script.js -->
  <script src="plan.js"></script>
  <script src="script.js"></script>
</body>
</html>
